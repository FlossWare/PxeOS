deployment:
  name: webserver-cluster
  nodes:
    - hostname: web-01
      mac: "aa:bb:cc:dd:ee:f1"
      provision:
        server: http://pxeos.local:8443
        profile: webserver
        os: fedora
        version: "42"

    - hostname: web-02
      mac: "aa:bb:cc:dd:ee:f2"
      provision:
        server: http://pxeos.local:8443
