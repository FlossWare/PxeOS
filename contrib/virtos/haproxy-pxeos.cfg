# VirtOS -> PxeOS HAProxy backend
#
# Include this snippet in your VirtOS HAProxy configuration to route
# PxeOS API requests through VirtOS.
#
# Endpoint mapping:
#   /api/v1/pxe/*  ->  /api/v1/*  (on pxeos backend)
#
# Usage:
#   1. Set the server address to match your PxeOS instance
#   2. Add a frontend rule to route to this backend:
#      acl is_pxeos path_beg /api/v1/pxe/
#      use_backend pxeos if is_pxeos

backend pxeos
    mode http
    option httpchk GET /api/v1/health
    http-check expect status 200
    server pxeos1 127.0.0.1:8443 check inter 10s
    http-request set-path %[path,regsub(^/api/v1/pxe/,/api/v1/)]
