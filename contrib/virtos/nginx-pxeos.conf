# VirtOS -> PxeOS reverse proxy (nginx)
#
# Include this snippet in your VirtOS nginx server block to proxy
# PxeOS API requests through VirtOS.
#
# Endpoint mapping:
#   /api/v1/pxe/*  ->  http://pxeos-upstream/api/v1/*
#
# Usage:
#   1. Set the upstream server address to match your PxeOS instance
#   2. Include this file in your nginx server block:
#      include /etc/nginx/conf.d/pxeos.conf;

upstream pxeos-upstream {
    server 127.0.0.1:8443;
}

location /api/v1/pxe/ {
    proxy_pass http://pxeos-upstream/api/v1/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Pass through auth headers
    proxy_set_header Authorization $http_authorization;

    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}
