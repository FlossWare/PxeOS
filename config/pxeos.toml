[server]
host = "0.0.0.0"
port = 8443
tls_cert = "/etc/pxeos/tls/cert.pem"
tls_key = "/etc/pxeos/tls/key.pem"

[paths]
tftp_root = "/var/lib/tftpboot/pxeos"
distro_root = "/var/lib/pxeos/distros"
data_dir = "/var/lib/pxeos"

[auth]
# Set to true to require API key authentication for protected endpoints.
# When false (default), all endpoints are open (backward compatible).
enabled = false

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# Emit JSON-formatted log lines (useful for log aggregation)
json_format = false
# Write logs to a file (with automatic rotation). Comment out to disable.
# log_file = "/var/log/pxeos/pxeos.log"
# Maximum log file size in bytes before rotation (default: 10 MB)
max_bytes = 10485760
# Number of rotated backup files to keep
backup_count = 5
# Forward logs to syslog
syslog_enabled = false
# Syslog socket path or host:port (e.g. "/dev/log" or "loghost:514")
syslog_address = "/dev/log"
# Forward logs to systemd journal (requires python-systemd)
journald_enabled = false

[defaults]
os = "debian"
version = "12"
profile = "base"
