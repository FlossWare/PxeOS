[server]
host = "0.0.0.0"
port = 8443
tls_cert = "/etc/pxeos/tls/cert.pem"
tls_key = "/etc/pxeos/tls/key.pem"

[paths]
tftp_root = "/var/lib/tftpboot/pxeos"
distro_root = "/var/lib/pxeos/distros"
data_dir = "/var/lib/pxeos"

[auth]
# Set to true to require API key authentication for protected endpoints.
# When false (default), all endpoints are open (backward compatible).
enabled = false

[defaults]
os = "debian"
version = "12"
profile = "base"
