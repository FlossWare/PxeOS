[profile]
name = "freebsd15"
os_family = "freebsd"
vendor = "freebsd"
os_version = "15.0"
arch = "amd64"
firmware = "bios"
install_url = "http://192.168.200.1:8880/distros/freebsd/15/x86_64/"

packages = ["vim", "tmux", "curl"]

post_scripts = [
    "curl -X POST http://192.168.200.1:8880/api/v1/provision/52:54:00:e2:e0:05/disable-netboot || true",
]

[profile.extra]
boot_iso = "FreeBSD-15.0-RELEASE-amd64-bootonly.iso"

[profile.network]
interface = "em0"
dhcp = true
hostname = "freebsd15-e2e"

[profile.disk]
filesystem = "zfs"
device = "ada0"
