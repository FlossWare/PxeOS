name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check pxeos/
      - name: Ruff format check
        run: ruff format --check pxeos/

  typecheck:
    name: MyPy Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: MyPy type check
        run: mypy pxeos/ --ignore-missing-imports

  security:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Bandit security scan (medium+ severity)
        run: bandit -r pxeos/ -c pyproject.toml -ll -ii

  quality-gate:
    name: Quality Gate
    if: always()
    needs: [lint, typecheck, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check quality results
        run: |
          echo "## Code Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff lint + format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MyPy type check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.security.result }}" != "success" ]]; then
            echo "Quality gate FAILED: one or more checks did not pass."
            exit 1
          fi
          echo "All quality checks passed."
