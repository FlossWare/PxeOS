<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PxeOS{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e1e4ed;
            --muted: #8b8fa3;
            --accent: #4f8ff7;
            --accent-hover: #3a7ae0;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem 0;
        }
        .sidebar h1 {
            font-size: 1.25rem;
            padding: 0 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        .sidebar h1 span { color: var(--accent); }
        .sidebar nav a {
            display: block;
            padding: 0.6rem 1.25rem;
            color: var(--muted);
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .sidebar nav a:hover, .sidebar nav a.active {
            color: var(--text);
            background: rgba(79, 143, 247, 0.1);
            text-decoration: none;
        }
        .sidebar nav a.active { border-left: 3px solid var(--accent); }

        .main { padding: 2rem; max-width: 1200px; }
        .main h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .card h3 { margin-bottom: 0.75rem; font-size: 1.1rem; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }
        .stat .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat .label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 0.25rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
        }
        th, td {
            text-align: left;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-linux { background: rgba(79,143,247,0.15); color: var(--accent); }
        .badge-bsd { background: rgba(52,211,153,0.15); color: var(--success); }
        .badge-windows { background: rgba(251,191,36,0.15); color: var(--warning); }

        form { display: flex; flex-direction: column; gap: 0.75rem; }
        label { font-size: 0.85rem; color: var(--muted); }
        input, select, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.5rem 0.75rem;
            color: var(--text);
            font-size: 0.9rem;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        textarea { min-height: 100px; resize: vertical; font-family: monospace; }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.25rem; }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { opacity: 0.85; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }

        .actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }

        .flash {
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .flash-success { background: rgba(52,211,153,0.15); border: 1px solid var(--success); }
        .flash-error { background: rgba(248,113,113,0.15); border: 1px solid var(--danger); }

        pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div style="text-align: center; padding: 0.5rem 1.25rem 0;">
                <img src="https://avatars.githubusercontent.com/u/448972?v=4"
                     alt="FlossWare" style="width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--border);">
            </div>
            <h1><span>Pxe</span>OS</h1>
            <nav>
                <a href="/web/" {% if page == "dashboard" %}class="active"{% endif %}>Dashboard</a>
                <a href="/web/distros" {% if page == "distros" %}class="active"{% endif %}>Distros</a>
                <a href="/web/profiles" {% if page == "profiles" %}class="active"{% endif %}>Profiles</a>
                <a href="/web/hosts" {% if page == "hosts" %}class="active"{% endif %}>Host Rules</a>
                <a href="/web/cloud-init" {% if page == "cloud-init" %}class="active"{% endif %}>Cloud-Init</a>
                <a href="/web/import" {% if page == "import" %}class="active"{% endif %}>Import</a>
            </nav>
        </aside>
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
